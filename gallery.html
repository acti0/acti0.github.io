<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="img/icon/logo.png">
        <title>tact // Gallery</title>
    </head>
    <body>
       <div class="out">
            <div class="window">
                <div class="windowtop">
                    <div class="windowtop-left">
                        <span>
                        <img class="top-app-image" src="img/icon/photo.png" alt=""></span>
                        <span>Photos</span>
                    </div>
                    <div>
                        <img class="top-icon-image" src="img/icon/minimize.png" alt="">
                        <img class="top-icon-image" src="img/icon/maximize.png" alt="">
                        <img class="top-icon-image" src="img/icon/close.png" alt="">
                    </div>
                </div>
                <div class="topnav">
                    <a href="index.html"><u>M</u>ain</a>
                    <a href="gallery.html"><u>P</u>hotos</a>
                    <a href="games.html"><u>G</u>ames</a>
                    <a href="resources.html"><u>R</u>esources</a>
                    <a href="help.html"><u>H</u>elp</a>
                </div>
                <div class="sub-page-content">
                    <div id="gallery" class="gallery-flex">
                        <div class="polaroid" onclick="openModal(this)">
                            <div class="polaroid-trim">
                                <img src="img/gwynne_head_square.png" alt="">
                            </div>
                            <p>First picture</p>
                        </div>
                        <div class="polaroid" onclick="openModal(this)">
                            <div class="polaroid-trim">
                                <img src="img/gwynne_head_square.png" alt="">
                            </div>
                            <p>text</p>
                        </div>
                        <div class="polaroid" onclick="openModal(this)">
                            <div class="polaroid-trim">
                                <img src="img/gwynne_head_square.png" alt="">
                            </div>
                            <p>text</p>
                        </div>
                        <div class="polaroid" onclick="openModal(this)">
                            <div class="polaroid-trim">
                                <img src="img/gwynne_head_square.png" alt="">
                            </div>
                            <p>Very long text that barely fits</p>
                        </div>

                    </div>
                    <div id="modal">
                        <span id="modalClose" onclick="closeModal()">&times;</span>
                        <img id="modalContent" class="modal-content">
                        <a id="modalPrev" class="prev" onclick="prevModal()">&#10094;</a>
                        <a id="modalNext" class="next" onclick="nextModal()">&#10095;</a>
                        <div id="modalCaption"></div>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <p>tact &#169; 2026 - &infin; All rights reserved.</p>
        </footer>
        <script>
            // Rotate polaroids slightly
            let gallery = document.getElementById("gallery");
            let children = gallery.children;
            for (var i = 0; i < children.length; i++) {
                let degrees = Math.floor(Math.random() * 10) - 5;
                children[i].style.rotate = degrees + "deg";
            }

            var modalSourceNode;
            var modal = document.getElementById("modal");

            function openModal(pol) {
                modalSourceNode = pol;

                // En-/disable navigation to next image
                document.getElementById("modalPrev").style.display = "block";
                document.getElementById("modalNext").style.display = "block";
                if (pol.previousElementSibling == null) {
                    document.getElementById("modalPrev").style.display = "none";
                }
                if (pol.nextElementSibling == null) {
                    document.getElementById("modalNext").style.display = "none";
                }

                // Setup dynamic info
                modal.style.display = "block";
                document.getElementById("modalContent").src = pol.firstElementChild.firstElementChild.src;
                document.getElementById("modalCaption").innerHTML = pol.lastElementChild.innerText;
            }

            function closeModal() {
                modal.style.display = "none";
            }

            function prevModal() {
                openModal(modalSourceNode.previousElementSibling)
            }

            function nextModal() {
                openModal(modalSourceNode.nextElementSibling)
            }

        </script>
    </body>
</html>
